name: e2e
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # weekly, Monday 06:00 UTC

jobs:
  # The app/fabric layer: native worker over the hub, ce-net.com hosting from CE blobs, and every
  # app's offline selftest. Independent of the consensus/adversarial suite so a ce-side regression
  # there cannot mask (or be masked by) these. Hermetic — loopback only, never touches ce-net.com.
  apps-fabric:
    name: apps + fabric (worker, gateway, app selftests)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CE_BIN:         ${{ github.workspace }}/ce-net/ce/target/release/ce
      EXPOSE_BIN:     ${{ github.workspace }}/ce-net/ce-expose/target/release/ce-expose
      HUB_BIN:        ${{ github.workspace }}/ce-net/ce-hub/target/release/ce-hub
      CE_STORAGE_BIN: ${{ github.workspace }}/ce-net/ce-storage/target/release/ce-storage
      WORKER_JS:      ${{ github.workspace }}/ce-net/ce-worker/worker.js
      WORKER_DIR:     ${{ github.workspace }}/ce-net/ce-worker
      GOV_DIR:        ${{ github.workspace }}/ce-net/ce-gov
      TABNET_DIR:     ${{ github.workspace }}/ce-net/ce-tabnet
      SCHED_DIR:      ${{ github.workspace }}/ce-net/ce-sched
      BENCH_DIR:      ${{ github.workspace }}/ce-net/ce-bench
    steps:
      - { name: Checkout e2e,        uses: actions/checkout@v4, with: { path: ce-net/e2e } }
      - { name: Checkout ce,         uses: actions/checkout@v4, with: { repository: ce-net/ce,         path: ce-net/ce } }
      - { name: Checkout ce-rs,      uses: actions/checkout@v4, with: { repository: ce-net/ce-rs,      path: ce-net/ce-rs } }
      - { name: Checkout ce-storage, uses: actions/checkout@v4, with: { repository: ce-net/ce-storage, path: ce-net/ce-storage } }
      # ce-hub is now its own repo (extracted from web/); it builds from ce-net/ce-hub and depends by
      # path on ce-rs + ce-storage (which in turn need ce-iam-core and the optional ce-pin manifest).
      - { name: Checkout ce-hub,     uses: actions/checkout@v4, with: { repository: ce-net/ce-hub,     path: ce-net/ce-hub } }
      - { name: Checkout ce-iam,     uses: actions/checkout@v4, with: { repository: ce-net/ce-iam,     path: ce-net/ce-iam } }
      - { name: Checkout ce-pin,     uses: actions/checkout@v4, with: { repository: ce-net/ce-pin,     path: ce-net/ce-pin } }
      - { name: Checkout ce-worker,  uses: actions/checkout@v4, with: { repository: ce-net/ce-worker,  path: ce-net/ce-worker } }
      - { name: Checkout ce-gov,     uses: actions/checkout@v4, with: { repository: ce-net/ce-gov,     path: ce-net/ce-gov } }
      - { name: Checkout ce-tabnet,  uses: actions/checkout@v4, with: { repository: ce-net/ce-tabnet,  path: ce-net/ce-tabnet } }
      - { name: Checkout ce-sched,   uses: actions/checkout@v4, with: { repository: ce-net/ce-sched,   path: ce-net/ce-sched } }
      - { name: Checkout ce-bench,   uses: actions/checkout@v4, with: { repository: ce-net/ce-bench,   path: ce-net/ce-bench } }
      - { name: Checkout ce-expose,  uses: actions/checkout@v4, with: { repository: ce-net/ce-expose,  path: ce-net/ce-expose } }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ce-net/ce -> target
            ce-net/ce-storage -> target
            ce-net/ce-hub -> target
            ce-net/ce-expose -> target
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build binaries
        run: |
          (cd ce-net/ce         && cargo build --release -p ce)
          (cd ce-net/ce-hub     && cargo build --release)
          (cd ce-net/ce-storage && cargo build --release --features gateway)
          # ce-expose's public ingress front door (axum) is feature-gated; build it in so the e2e
          # exercises the `ce-expose ingress` subcommand. Path-deps ../ce-rs and ../ce/crates/* are
          # already provided by the sibling checkouts above.
          (cd ce-net/ce-expose  && cargo build --release --features ingress)
      - name: app selftests
        working-directory: ce-net/e2e
        run: |
          chmod +x *.sh
          ./e2e-apps.sh
      - name: native worker over the hub
        if: always()
        working-directory: ce-net/e2e
        run: ./e2e-worker.sh
      - name: ce-net.com hosting from CE blobs (storage gateway)
        if: always()
        working-directory: ce-net/e2e
        run: ./e2e-gateway.sh
      - name: ce-expose public ingress (default-deny, kill switch, rate limit)
        if: always()
        working-directory: ce-net/e2e
        run: ./e2e-ingress.sh

  # Consensus + capability adversarial suite (the original e2e). Stands up real mining meshes and
  # attacks them. A red here is a real ce-level signal — keep it isolated so it never blocks the
  # app/fabric layer above.
  adversarial:
    name: consensus + capability adversarial
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CE_BIN:   ${{ github.workspace }}/ce-net/ce/target/release/ce
      RDEV_BIN: ${{ github.workspace }}/ce-net/rdev/target/release/rdev
      REPL_BIN: ${{ github.workspace }}/ce-net/replicator/target/release/replicator
    steps:
      - { name: Checkout e2e,        uses: actions/checkout@v4, with: { path: ce-net/e2e } }
      - { name: Checkout ce,         uses: actions/checkout@v4, with: { repository: ce-net/ce,         path: ce-net/ce } }
      - { name: Checkout rdev,       uses: actions/checkout@v4, with: { repository: ce-net/rdev,        path: ce-net/rdev } }
      - { name: Checkout replicator, uses: actions/checkout@v4, with: { repository: ce-net/replicator,  path: ce-net/replicator } }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ce-net/ce -> target
            ce-net/rdev -> target
            ce-net/replicator -> target
      - name: Build binaries
        run: |
          (cd ce-net/ce         && cargo build --release -p ce)
          (cd ce-net/rdev       && cargo build --release)
          (cd ce-net/replicator && cargo build --release)
      - name: Run consensus + capability adversarial suite
        working-directory: ce-net/e2e
        run: |
          chmod +x *.sh
          ./e2e-local.sh
          ./e2e-replicate.sh
          ./e2e-attack.sh 6 40 12

  # The "try to compromise the mesh" red team. Stands up real ephemeral CE nodes (CE-TWLE main) and
  # ATTACKS them, asserting the defenses hold. Mirrors the `adversarial` job's checkout+build of ce
  # (plus rdev, the ce-cap enforcement point that e2e-attack-caps.sh drives). Each e2e-attack-*.sh
  # runs as its OWN `if: always()` step so one red defense does not mask the others. A red here is a
  # real ce-level regression: a MUST-HOLD defense that the audit says is implemented was DEFEATED.
  # KNOWN-OPEN holes (E1/E2/E4/E5, eclipse/IP-diversity, guardian, V4/V8) print a loud KNOWN-OPEN
  # line and are tallied separately — they do NOT fail the suite (they flip to red when the fix lands).
  redteam:
    name: adversarial red team (compromise the mesh)
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      CE_BIN:     ${{ github.workspace }}/ce-net/ce/target/release/ce
      RDEV_BIN:   ${{ github.workspace }}/ce-net/rdev/target/release/rdev
      EXPOSE_BIN: ${{ github.workspace }}/ce-net/ce-expose/target/release/ce-expose
    steps:
      - { name: Checkout e2e,       uses: actions/checkout@v4, with: { path: ce-net/e2e } }
      - { name: Checkout ce,        uses: actions/checkout@v4, with: { repository: ce-net/ce,        path: ce-net/ce } }
      - { name: Checkout rdev,      uses: actions/checkout@v4, with: { repository: ce-net/rdev,      path: ce-net/rdev } }
      - { name: Checkout ce-rs,     uses: actions/checkout@v4, with: { repository: ce-net/ce-rs,     path: ce-net/ce-rs } }
      # ce-expose depends by path on ce-iam-core (../ce-iam/crates/ce-iam-core); without it the
      # feature-gated ingress build fails and the ingress red team can't stand up its front door.
      - { name: Checkout ce-iam,    uses: actions/checkout@v4, with: { repository: ce-net/ce-iam,    path: ce-net/ce-iam } }
      - { name: Checkout ce-expose, uses: actions/checkout@v4, with: { repository: ce-net/ce-expose, path: ce-net/ce-expose } }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ce-net/ce -> target
            ce-net/rdev -> target
            ce-net/ce-expose -> target
      - name: Build binaries
        run: |
          (cd ce-net/ce   && cargo build --release -p ce)
          # rdev is the ce-cap enforcement point that e2e-attack-caps.sh drives; if its build fails
          # caps.sh degrades (CAP1/CAP2/CAP10 still run), so do not let it gate the whole job.
          (cd ce-net/rdev && cargo build --release) || echo "rdev build failed; caps.sh will skip cap-chain attacks"
          # ce-expose's public ingress front door (axum) is feature-gated; build it in so the ingress
          # red team can drive `ce-expose ingress`. If its build fails, e2e-attack-ingress.sh skips
          # cleanly (EXPOSE_BIN absent), so do not let it gate the whole job.
          (cd ce-net/ce-expose && cargo build --release --features ingress) || echo "ce-expose build failed; ingress attack suite will skip"
      - name: chmod scripts
        working-directory: ce-net/e2e
        run: chmod +x *.sh lib/*.sh
      # Each attack as its own always()-step: a red MUST-HOLD defense in one script never masks the
      # results of the others.
      - name: capability / auth red team (MUST-HOLD ce-cap; D1 known-open)
        if: always()
        working-directory: ce-net/e2e
        run: ./e2e-attack-caps.sh
      - name: transport / RPC red team (MUST-HOLD noise+token+cap; N1/N2/N7 known-open)
        if: always()
        working-directory: ce-net/e2e
        run: ./e2e-attack-transport.sh
      - name: economy / double-spend red team (MUST-HOLD E3/E6; E4/E5 known-open)
        if: always()
        working-directory: ce-net/e2e
        run: ./e2e-attack-economy.sh
      - name: CE-TWLE consensus integrity red team (MUST-HOLD slot/equivocation; V8 known-open)
        if: always()
        working-directory: ce-net/e2e
        run: ./e2e-attack-consensus.sh
      - name: sybil / fake-capacity red team (MUST-HOLD signer+burn; E1/E2/E4 known-open)
        if: always()
        working-directory: ce-net/e2e
        run: ./e2e-attack-sybil-capacity.sh
      - name: network / eclipse red team (MUST-HOLD offline append; N3-N6/N8 known-open)
        if: always()
        working-directory: ce-net/e2e
        run: ./e2e-attack-eclipse.sh
      - name: data / job integrity red team (MUST-HOLD content-address; V4/guardian known-open)
        if: always()
        working-directory: ce-net/e2e
        run: ./e2e-attack-data-job.sh
      - name: public ingress red team (MUST-HOLD default-deny/host-spoof/SSRF/private-cap/rate/kill)
        if: always()
        working-directory: ce-net/e2e
        run: ./e2e-attack-ingress.sh

  # Live production smoke + security invariants against the real relay. Hits ce-net.com, so it only
  # runs on a schedule or manual dispatch (not on every push/PR).
  prod-smoke:
    name: production smoke + security invariants (live)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    steps:
      - { name: Checkout e2e, uses: actions/checkout@v4 }
      - name: Run production smoke
        run: |
          chmod +x e2e-prod.sh
          ./e2e-prod.sh
